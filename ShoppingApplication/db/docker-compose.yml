services:
  mssqlServer:
    container_name: mssqlServer
    image: mcr.microsoft.com/mssql/server:2019-latest
    restart: always
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "@12tf56so"
      # Optional: hvis du vil sikre collation, timezone osv. kan du tilføje mere
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data: